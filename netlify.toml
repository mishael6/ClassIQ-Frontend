[build]
  command   = "npm install && npm run build"
  publish   = "dist"

[build.environment]
  NPM_FLAGS = "--include=dev"
  NODE_VERSION = "20"

[[redirects]]
  from   = "/api/*"
  to     = "https://api-classiq.onrender.com/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200